name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, gd, bcmath, intl, posix, fileinfo
          coverage: none

      - name: Prepare Laravel Environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            cat > .env <<'EOF'
          APP_KEY=
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          DB_CONNECTION=sqlite
          DB_DATABASE=/var/www/reviactyl/database/database.sqlite
          CACHE_STORE=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          EOF
          fi
          php artisan key:generate

      - name: Create SQLite Database
        run: touch database/database.sqlite

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Check PHP Formatting (Pint)
        run: ./vendor/bin/pint --test -v

      - name: Static Analysis (PHPStan)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Run Tests (Pest)
        run: php artisan test --parallel || true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Get pnpm Store Directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Type Check (TSC)
        run: pnpm run tsc

      - name: Build
        run: pnpm run build
